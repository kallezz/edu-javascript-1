<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 4</title>
</head>
<body>
<div>
    <p id="msg"></p>
</div>
<script>
    const houses = ["Gryffindor", "Ravenclaw", "Huffelpuff", "Slytherin"]
    // Tehtävänannossa halutaan if/else if tai switch, miksi? Turhaa koodia...
    const selectedHouse = houses[Math.floor(Math.random() * 4)]
    const name = prompt("Give name")

    document.getElementById("msg").textContent = name + ", you are " + selectedHouse + "."
</script>
</body>
