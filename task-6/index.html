<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 6</title>
</head>
<body>
<div>
    <p id="content"></p>
</div>
<script>
    let num
    const confirmation = confirm("Should I calculate the square root?")

    if(confirmation) {
        num = prompt("Enter a number")

        if (num >= 0) {
            document.getElementById("content").textContent = "Squareroot is " + Math.sqrt(num)
        } else {
            document.getElementById("content").textContent = "The square root of a negative number is not defined"
        }
    } else {
        document.getElementById("content").textContent = "The square root is not calculated."
    }
</script>
</body>
</html>
