<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 6</title>
</head>
<body>
<ul id="rollList"></ul>
<script>
  function rollDice() {
    return Math.floor(Math.random() * 6) + 1;
  }

  const rolls = [];
  let result;

  do {
    result = rollDice();
    rolls.push(result);
  } while (result !== 6);

  document.getElementById("rollList").innerHTML = rolls.map(roll => `<li>${roll}</li>`).join('');
</script>
</body>
</html>
